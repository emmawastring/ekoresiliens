name: Uppdatera webbinarier

on:
  schedule:
    # Kör varje dag kl 06:00 UTC (08:00 svensk sommartid)
    - cron: "0 6 * * *"
  workflow_dispatch:   # Tillåter manuell körning från GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Behövs för att commita tillbaka till repot

    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # få hela historiken så att vi kan pull/rebase

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Kör scrapers
        run: python -m scrapers.run_all

      - name: Verifiera att data genererades
        run: |
          if [ -f data/webinars.json ]; then
            echo "✅ webinars.json genererad"
          else
            echo "❌ Fel: webinars.json inte genererad"
            exit 1
          fi

      - name: Commita och pusha data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Använd -f för att override .gitignore och forcea add
          git add -f data/webinars.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto: uppdatera webbinarier $(date -u +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push origin main
          else
            echo "ℹ️  Ingen ny data att uppdatera"
          fi
