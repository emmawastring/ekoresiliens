name: Uppdatera webbinarier

on:
  schedule:
    # Kör varje dag kl 06:00 UTC (08:00 svensk sommartid)
    - cron: "0 6 * * *"
  workflow_dispatch:   # Tillåter manuell körning från GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Behövs för att commita tillbaka till repot

    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # få hela historiken så att vi kan pull/rebase

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Kör scrapers
        run: python -m scrapers.run_all

      - name: Verifiera att data genererades
        run: |
          if [ -f data/webinars.json ]; then
            echo "✅ webinars.json genererad"
          else
            echo "❌ Fel: webinars.json inte genererad"
            exit 1
          fi
